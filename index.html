<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гитарный опросник — отстройка акустики</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f4f1eb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 660px;
    width: 100%;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #2c1810 0%, #5a3825 100%);
    color: #fff;
    padding: 28px 32px 24px;
  }
  .header h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 0.8rem; opacity: 0.65; }
  .progress-bar-wrap {
    background: rgba(255,255,255,0.15);
    border-radius: 8px; height: 6px;
    margin-top: 18px; overflow: hidden;
  }
  .progress-bar {
    background: #e8a045; height: 100%;
    border-radius: 8px; transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.72rem; opacity: 0.6; margin-top: 6px; text-align: right; }

  .body { padding: 30px 32px 26px; }
  .question-num {
    font-size: 0.7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: #b07030; margin-bottom: 9px;
  }
  .question-text {
    font-size: 1.15rem; font-weight: 600;
    color: #1a1a1a; line-height: 1.45; margin-bottom: 8px;
  }
  .question-hint {
    font-size: 0.82rem; color: #888;
    line-height: 1.5; margin-bottom: 20px;
  }
  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 24px; }
  .option-btn {
    background: #faf8f4; border: 2px solid #e8e0d0;
    border-radius: 12px; padding: 13px 16px;
    text-align: left; cursor: pointer;
    transition: all 0.16s ease;
    font-size: 0.95rem; color: #2a2a2a; line-height: 1.4;
  }
  .option-btn:hover { border-color: #b07030; background: #fef9f0; transform: translateX(3px); }
  .option-btn .opt-arrow { color: #b07030; font-weight: 700; margin-right: 6px; }
  .option-btn .opt-sub {
    display: block; font-size: 0.8rem;
    color: #999; margin-top: 2px;
  }
  .btn-back {
    background: none; border: 2px solid #ddd;
    border-radius: 10px; padding: 9px 18px;
    font-size: 0.88rem; color: #777; cursor: pointer;
    transition: all 0.16s;
  }
  .btn-back:hover { border-color: #aaa; color: #444; }

  /* Result */
  .result-wrap { padding: 30px 32px; }
  .result-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 13px; border-radius: 20px;
    font-size: 0.78rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 14px;
  }
  .result-title { font-size: 1.38rem; font-weight: 800; color: #1a1a1a; margin-bottom: 11px; line-height: 1.3; }
  .result-desc { font-size: 0.95rem; color: #444; line-height: 1.65; margin-bottom: 18px; }
  .result-task {
    background: #faf8f4; border-left: 4px solid #b07030;
    border-radius: 0 10px 10px 0; padding: 14px 16px;
    font-size: 0.91rem; color: #333; line-height: 1.65; margin-bottom: 22px;
  }
  .result-task strong {
    display: block; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: #b07030; margin-bottom: 6px;
  }
  .warning-box {
    background: #fff8ed; border: 2px solid #f0a030;
    border-radius: 12px; padding: 13px 16px;
    font-size: 0.91rem; color: #6a3f00; line-height: 1.6; margin-bottom: 18px;
  }
  .warning-box strong { display: block; margin-bottom: 4px; font-weight: 700; }
  .btn-restart {
    background: linear-gradient(135deg, #2c1810, #5a3825);
    color: #fff; border: none; border-radius: 12px;
    padding: 12px 26px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.16s;
  }
  .btn-restart:hover { opacity: 0.85; }

  .r-none   { background:#eef6ff; color:#1a5fa8; }
  .r-maxlow { background:#e6f9f0; color:#0e6e3c; }
  .r-low    { background:#edfbf0; color:#1a6e40; }
  .r-std    { background:#fff8e6; color:#8a5a00; }
  .r-high   { background:#fff1e6; color:#9a3a00; }
  .r-conf   { background:#ffeaea; color:#9a1a1a; }

  @media (max-width: 480px) {
    .body, .result-wrap { padding: 22px 18px; }
    .header { padding: 20px 18px 16px; }
    .question-text { font-size: 1.05rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🎸 Отстройка акустической гитары</h1>
    <p>Внутренний опросник — для менеджера</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">Вопрос 1 из 5</div>
  </div>
  <div id="quizArea">
    <div class="body" id="questionArea"></div>
  </div>
</div>

<script>
const questions = [
  {
    id: "exp",
    text: "Как давно клиент играет на гитаре?",
    hint: "",
    options: [
      { val: "beginner",      label: "Только начинает",        sub: "Меньше года, первая гитара, аккорды даются с трудом" },
      { val: "intermediate",  label: "Несколько лет",           sub: "Уверенно играет, есть репертуар, но не профессионал" },
      { val: "advanced",      label: "Давно и серьёзно",        sub: "Опытный игрок, хорошо чувствует инструмент, знает чего хочет" }
    ]
  },
  {
    id: "style",
    text: "Какие техники игры использует клиент?",
    hint: "Можно уточнить: «Вы больше перебираете или играете боем, или всё вместе?»",
    options: [
      { val: "fingerstyle",   label: "Перебор / фингерстайл",   sub: "Пальцами, точечное касание отдельных струн" },
      { val: "strum",         label: "Бой / медиатором",         sub: "Ритмичный стрём, преимущественно по всем струнам" },
      { val: "mixed",         label: "Смешанный",                sub: "И перебор, и бой — зависит от песни" },
      { val: "all",           label: "Всё сразу в одной партии", sub: "Фингерстайл с одновременным контрастом: тихая мелодия + громкие басы, динамические сдвиги внутри пьесы" }
    ]
  },
  {
    id: "attack",
    text: "Как клиент играет по силе атаки?",
    hint: "Важно: речь о типичной манере игры, а не о максимуме на который способен.",
    options: [
      { val: "light",         label: "Тихо и деликатно",        sub: "Лёгкое касание, мягкая рука, играет негромко" },
      { val: "medium",        label: "Средне",                   sub: "Обычная громкость, без крайностей" },
      { val: "heavy",         label: "Громко, с напором",        sub: "Любит мощный бой, сильный удар, энергичная игра" },
      { val: "dynamic",       label: "Очень широкая динамика",   sub: "Осознанно управляет силой: от шёпота до мощного форте в одном произведении" }
    ]
  },
  {
    id: "goal",
    text: "Что для клиента важнее всего при игре?",
    hint: "Это ключевой вопрос — он определяет приоритет отстройки. Можно спросить напрямую.",
    options: [
      { val: "comfort",       label: "Удобство зажима",         sub: "Лёгкость игры, пальцы не устают — главное комфорт" },
      { val: "volume",        label: "Громкость и объём звука",  sub: "Гитара должна звучать мощно: для пения, выступлений, компании" },
      { val: "clean",         label: "Чистота и точность",       sub: "Важна идеальная чистота, никаких призвуков, запись или сольное исполнение" },
      { val: "balance",       label: "Баланс всего сразу",       sub: "Нет явного приоритета — хочет и удобно, и чисто, и достаточно громко" }
    ]
  },
  {
    id: "buzz",
    text: "Как клиент относится к лёгкому «дыханию» струн?",
    hint: "Небольшое дыхание — это не брак. Уточните, раздражает ли это человека.",
    options: [
      { val: "hate",          label: "Категорически не приемлет",sub: "Любой лишний звук раздражает, хочет абсолютной чистоты" },
      { val: "ok",            label: "Допускает небольшое",      sub: "Если зато играть удобнее — нормально" },
      { val: "love",          label: "Нравится живой звук",      sub: "Считает лёгкий призвук характером инструмента" }
    ]
  }
];

const results = {
  none: {
    badge: "🟦 Отстройка не нужна",
    badgeClass: "r-none",
    title: "Гитара готова к выдаче без изменений",
    desc: "Опытный игрок без явных приоритетов и жалоб. Стандартная заводская высота подходит под его стиль. Вмешательство сейчас избыточно — пусть поиграет, и если что-то почувствует, вернётся.",
    task: "Мастеру: ничего не делаем. Выдаём в заводском состоянии."
  },
  maxlow: {
    badge: "🟢 Максимально низкая",
    badgeClass: "r-maxlow",
    title: "Профессиональная точная отстройка — минимальная высота",
    desc: "Опытный игрок с лёгкой атакой, для которого важна чистота и минимальное сопротивление грифа. При такой технике дребезга не будет — амплитуда колебания струны маленькая.",
    task: "Мастеру: выставить высоту на нижней технической границе. 6-я струна — около 1,8 мм на 12-м ладу, 1-я — около 1,3–1,5 мм. Проверить верхний порожек. Тонкая работа, важна точность."
  },
  low: {
    badge: "🟡 Низкая комфортная",
    badgeClass: "r-low",
    title: "Снизить высоту — приоритет комфорт",
    desc: "Начинающий или любитель, которому тяжело зажимать аккорды. Цель — убрать физическое сопротивление. Часто основная проблема именно в верхнем порожке, а не в седле.",
    task: "Мастеру: снизить высоту до нижней границы нормы. 6-я струна — около 2,0–2,2 мм на 12-м ладу, 1-я — около 1,5–1,7 мм. Обязательно проверить верхний порожек — у начинающих это частая первопричина дискомфорта."
  },
  std: {
    badge: "🟠 Стандартная средняя",
    badgeClass: "r-std",
    title: "Стандартная отстройка — золотой баланс",
    desc: "Сбалансированный профиль: нет перекосов ни в сторону комфорта, ни в сторону громкости. Стандартная высота обеспечивает и нормальный зажим, и достаточный звук.",
    task: "Мастеру: стандартная средняя высота. 6-я струна — около 2,3–2,5 мм на 12-м ладу, 1-я — около 1,8–2,0 мм. Проверить верхний порожек."
  },
  dynamic: {
    badge: "🟣 Динамическая отстройка",
    badgeClass: "r-std",
    title: "Средняя высота с запасом под динамику",
    desc: "Игрок осознанно работает с широким диапазоном динамики — от тихого пианиссимо до мощного форте в одном произведении. При низкой высоте мощные удары неизбежно будут давать дребезг. Нужен запас, который не будет мешать при тихой игре, но защитит при громкой.",
    task: "Мастеру: средняя высота с небольшим запасом вверх. 6-я струна — около 2,3–2,6 мм на 12-м ладу, 1-я — около 1,8–2,0 мм. Не снижать до минимума, даже если клиент просит — объяснить причину."
  },
  high: {
    badge: "🔴 Средне-высокая",
    badgeClass: "r-high",
    title: "Держать высоту — нужен запас и проекция",
    desc: "Сильная атака или приоритет громкости. При мощной игре нужен зазор — иначе будет дребезг. Более высокое действие на акустике также даёт больший объём и проекцию звука при выступлениях.",
    task: "Мастеру: не снижать высоту. 6-я струна — около 2,7–3,0 мм на 12-м ладу, 1-я — около 2,0–2,3 мм. Если гитара пришла заниженной — поднять седло."
  },
  conflict: {
    badge: "⚠️ Конфликтный случай",
    badgeClass: "r-conf",
    title: "Сильная атака + запрос на низкий комфорт",
    desc: "Физически несовместимые вещи. При сильном ударе струна колеблется с большой амплитудой и будет задевать лады при низкой высоте. Это не брак гитары — это физика. Нужно объяснить до передачи инструмента.",
    task: "Скрипт: «Мы можем поставить струны низко, но при вашей манере игры они будут звенеть — это не дефект, это физика. Давайте найдём баланс: сделаем удобно, но с небольшим запасом, чтобы звук был чистым.» Зафиксируйте договорённость. Мастеру: средняя высота, не снижать ниже стандарта.",
    isConflict: true
  }
};

let answers = {};
let history = [];
let currentQ = 0;

function getResult() {
  const { exp, style, attack, goal, buzz } = answers;

  // Конфликт: сильная атака + хочет комфорт/лёгкость
  if (attack === "heavy" && goal === "comfort") return results.conflict;

  // Динамическая игра (fingerstyle с контрастной динамикой или style=all)
  if (style === "all" || attack === "dynamic") return results.dynamic;

  // Отстройка не нужна: опытный, баланс или громкость, средняя атака, не требует чистоты фанатично
  if (exp === "advanced" && attack === "medium" && (goal === "balance" || goal === "volume") && buzz !== "hate") {
    return results.none;
  }

  // Максимально низкая: опытный/любитель + чистота или комфорт + лёгкая атака + фингерстайл/перебор
  if ((exp === "advanced" || exp === "intermediate") && attack === "light" && style === "fingerstyle" && (goal === "clean" || goal === "comfort")) {
    return results.maxlow;
  }

  // Средне-высокая: сильная атака или приоритет громкости
  if (attack === "heavy") return results.high;
  if (goal === "volume" && attack !== "light") return results.high;

  // Низкая комфортная: начинающий + комфорт + не сильная атака
  if (exp === "beginner" && attack !== "heavy") return results.low;

  // Низкая: любитель + дома + лёгкая атака + комфорт
  if (exp === "intermediate" && attack === "light" && goal === "comfort") return results.low;

  // Максимально низкая: опытный, чистота, лёгкая атака любой стиль
  if (exp === "advanced" && attack === "light" && goal === "clean") return results.maxlow;

  // Стандарт — всё остальное
  return results.std;
}

function render() {
  const area = document.getElementById("questionArea");
  const bar = document.getElementById("progressBar");
  const lbl = document.getElementById("progressLabel");
  const total = questions.length;
  bar.style.width = ((currentQ / total) * 100) + "%";
  lbl.textContent = "Вопрос " + (currentQ + 1) + " из " + total;

  const q = questions[currentQ];
  let html = `<div class="question-num">Вопрос ${currentQ + 1} из ${total}</div>
              <div class="question-text">${q.text}</div>`;
  if (q.hint) html += `<div class="question-hint">💬 ${q.hint}</div>`;
  html += `<div class="options">`;
  q.options.forEach(opt => {
    html += `<button class="option-btn" onclick="choose('${q.id}','${opt.val}')">
               <span class="opt-arrow">→</span>${opt.label}
               <span class="opt-sub">${opt.sub}</span>
             </button>`;
  });
  html += `</div><div>`;
  if (currentQ > 0) html += `<button class="btn-back" onclick="goBack()">← Назад</button>`;
  html += `</div>`;
  area.innerHTML = html;
}

function choose(qId, val) {
  history.push({ q: currentQ, ans: {...answers} });
  answers[qId] = val;
  if (currentQ < questions.length - 1) { currentQ++; render(); }
  else showResult();
}

function goBack() {
  if (!history.length) return;
  const prev = history.pop();
  currentQ = prev.q;
  answers = prev.ans;
  render();
}

function showResult() {
  const r = getResult();
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressLabel").textContent = "Готово ✓";

  let conflictHtml = r.isConflict
    ? `<div class="warning-box"><strong>⚠️ Скрипт для менеджера:</strong>«Мы можем поставить низко, но при вашей манере игры струны будут звенеть — это не дефект, это физика. Давайте найдём баланс: удобно и чисто.» Зафиксируйте договорённость с клиентом.</div>` : "";

  document.getElementById("quizArea").innerHTML = `
    <div class="result-wrap">
      <div class="result-badge ${r.badgeClass}">${r.badge}</div>
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      ${conflictHtml}
      <div class="result-task"><strong>🔧 Задание мастеру</strong>${r.task}</div>
      <button class="btn-restart" onclick="restart()">↺ Начать заново</button>
    </div>`;
}

function restart() {
  answers = {}; history = []; currentQ = 0;
  document.getElementById("quizArea").innerHTML = '<div class="body" id="questionArea"></div>';
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("progressLabel").textContent = "Вопрос 1 из 5";
  render();
}

render();
</script>
</body>
</html>
