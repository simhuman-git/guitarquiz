<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гитарный опросник — отстройка акустики</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f4f1eb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    max-width: 640px;
    width: 100%;
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #2c1810 0%, #5a3825 100%);
    color: #fff;
    padding: 28px 32px 24px;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 0.82rem;
    opacity: 0.7;
    font-weight: 400;
  }
  .progress-bar-wrap {
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    height: 6px;
    margin-top: 18px;
    overflow: hidden;
  }
  .progress-bar {
    background: #e8a045;
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.75rem;
    opacity: 0.65;
    margin-top: 7px;
    text-align: right;
  }
  .body {
    padding: 32px 32px 28px;
  }
  .question-num {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #b07030;
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 1.18rem;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.45;
    margin-bottom: 24px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }
  .option-btn {
    background: #faf8f4;
    border: 2px solid #e8e0d0;
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
    font-size: 0.97rem;
    color: #2a2a2a;
    line-height: 1.4;
  }
  .option-btn:hover {
    border-color: #b07030;
    background: #fef9f0;
    transform: translateX(3px);
  }
  .option-btn .opt-label {
    font-weight: 600;
    color: #b07030;
    margin-right: 6px;
  }
  .option-btn .opt-sub {
    display: block;
    font-size: 0.82rem;
    color: #888;
    margin-top: 2px;
  }
  .nav-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn-back {
    background: none;
    border: 2px solid #ddd;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 0.9rem;
    color: #777;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-back:hover { border-color: #aaa; color: #444; }

  /* Result */
  .result-wrap { padding: 32px; }
  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }
  .result-title {
    font-size: 1.45rem;
    font-weight: 800;
    color: #1a1a1a;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .result-desc {
    font-size: 0.97rem;
    color: #444;
    line-height: 1.65;
    margin-bottom: 20px;
  }
  .result-task {
    background: #faf8f4;
    border-left: 4px solid #b07030;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    font-size: 0.92rem;
    color: #333;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .result-task strong {
    display: block;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #b07030;
    margin-bottom: 6px;
  }
  .warning-box {
    background: #fff8ed;
    border: 2px solid #f0a030;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.92rem;
    color: #6a3f00;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .warning-box strong {
    display: block;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .btn-restart {
    background: linear-gradient(135deg, #2c1810, #5a3825);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 28px;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.18s;
  }
  .btn-restart:hover { opacity: 0.85; }

  .r-none   { background:#eef6ff; color:#1a5fa8; }
  .r-maxlow { background:#e6f9f0; color:#0e6e3c; }
  .r-low    { background:#e6f9f0; color:#0e6e3c; }
  .r-std    { background:#fff8e6; color:#8a5a00; }
  .r-high   { background:#fff1e6; color:#9a3a00; }
  .r-conf   { background:#ffeaea; color:#9a1a1a; }

  @media (max-width: 480px) {
    .body, .result-wrap { padding: 22px 20px; }
    .header { padding: 22px 20px 18px; }
    .question-text { font-size: 1.05rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🎸 Отстройка акустической гитары</h1>
    <p>Внутренний опросник — для менеджера</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">Вопрос 1 из 5</div>
  </div>

  <div id="quizArea">
    <div class="body" id="questionArea"></div>
  </div>
</div>

<script>
const questions = [
  {
    id: "exp",
    num: "Вопрос 1 из 5",
    text: "Как давно клиент играет на гитаре?",
    options: [
      { val: "beginner", label: "Только начинает", sub: "Меньше года, первая гитара, аккорды ещё даются с трудом" },
      { val: "intermediate", label: "Несколько лет", sub: "Уверенно играет, есть репертуар, но профессионалом себя не считает" },
      { val: "advanced", label: "Давно и серьёзно", sub: "Опытный игрок, хорошо чувствует инструмент, знает чего хочет" }
    ]
  },
  {
    id: "style",
    num: "Вопрос 2 из 5",
    text: "Как клиент чаще всего играет?",
    options: [
      { val: "fingerstyle", label: "Перебор / фингерстайл", sub: "Пальцами, точечное касание отдельных струн" },
      { val: "strum", label: "Бой / медиатором", sub: "Ритмичный стрём по всем струнам" },
      { val: "mixed", label: "Смешанный стиль", sub: "И перебор, и бой — по ситуации" }
    ]
  },
  {
    id: "attack",
    num: "Вопрос 3 из 5",
    text: "Как клиент играет — тихо или с напором?",
    options: [
      { val: "light", label: "Тихо и деликатно", sub: "Лёгкое касание, играет негромко, мягкая рука" },
      { val: "medium", label: "Средне", sub: "Обычная громкость, ничего экстремального" },
      { val: "heavy", label: "Громко, с напором", sub: "Любит мощный бой, сильный удар, играет энергично" }
    ]
  },
  {
    id: "context",
    num: "Вопрос 4 из 5",
    text: "Где клиент чаще всего играет?",
    options: [
      { val: "home", label: "Дома, для себя", sub: "Тихая комната, никаких выступлений" },
      { val: "company", label: "В компании / под пение", sub: "Бардовские вечера, аккомпанемент, небольшая группа" },
      { val: "stage", label: "Сцена / ансамбль", sub: "Живые выступления, нужно пробиваться через другие инструменты" }
    ]
  },
  {
    id: "buzz",
    num: "Вопрос 5 из 5",
    text: "Как клиент относится к лёгкому «дыханию» струн?",
    options: [
      { val: "hate", label: "Раздражает любой призвук", sub: "Хочет абсолютно чистый звук" },
      { val: "ok", label: "Небольшое дыхание допускает", sub: "Если зато играть удобнее — нормально" },
      { val: "love", label: "Нравится живой характер", sub: "Призвук считает частью звука инструмента" }
    ]
  }
];

const results = {
  none: {
    badge: "🟦 Отстройка не нужна",
    badgeClass: "r-none",
    title: "Гитара готова к выдаче без изменений",
    desc: "Опытный игрок со средней атакой и без конкретных жалоб. Стандартная заводская высота струн подходит под его стиль. Любое вмешательство сейчас избыточно — пусть человек поиграет, и если что-то почувствует, вернётся.",
    task: "Мастеру: ничего не делаем. Выдаём в заводском состоянии."
  },
  maxlow: {
    badge: "🟢 Максимально низкая",
    badgeClass: "r-maxlow",
    title: "Профессиональная низкая отстройка",
    desc: "Опытный фингерстайл-игрок с лёгкой атакой. Это осознанный профессиональный выбор — минимальное сопротивление грифа, максимальная чистота и динамика. При такой технике игры дребезга не будет.",
    task: "Мастеру: выставить высоту на нижней технической границе. 6-я струна — около 1,8 мм на 12-м ладу, 1-я — около 1,3–1,5 мм. Проверить верхний порожек. Это тонкая работа — важна точность."
  },
  low: {
    badge: "🟡 Низкая комфортная",
    badgeClass: "r-low",
    title: "Снизить высоту для комфорта",
    desc: "Начинающий или любитель с лёгкой или средней атакой, играет дома. Основная цель — снять физическое сопротивление при зажиме аккордов. Высота может мешать не из-за техники, а просто потому что пальцы ещё не привыкли.",
    task: "Мастеру: снизить высоту до нижней границы нормы. 6-я струна — около 2,0–2,2 мм на 12-м ладу, 1-я — около 1,5–1,7 мм. Проверить верхний порожек — часто именно там основная проблема у новичков."
  },
  std: {
    badge: "🟠 Стандартная средняя",
    badgeClass: "r-std",
    title: "Стандартная отстройка — золотой баланс",
    desc: "Средняя атака, смешанный стиль, компания или несколько контекстов. Стандартная высота обеспечивает баланс между комфортом зажима, чистотой звука и достаточным объёмом при игре в компании.",
    task: "Мастеру: выставить стандартную среднюю высоту. 6-я струна — около 2,3–2,5 мм на 12-м ладу, 1-я — около 1,7–2,0 мм. Проверить верхний порожек."
  },
  high: {
    badge: "🔴 Средне-высокая",
    badgeClass: "r-high",
    title: "Держать высоту — нужен запас и проекция",
    desc: "Сильная атака, бой, сцена или ансамбль. При мощной игре нужен запас по зазору, иначе будет дребезг. Кроме того, более высокое действие на акустике даёт бо́льшую громкость и объём — это плюс для выступлений.",
    task: "Мастеру: не снижать высоту. Ориентир — 6-я струна около 2,7–3,0 мм на 12-м ладу, 1-я — около 2,0–2,3 мм. Если гитара пришла с заниженной высотой — поднять седло."
  },
  conflict: {
    badge: "⚠️ Конфликтный случай",
    badgeClass: "r-conf",
    title: "Сильная атака + запрос на низкие струны",
    desc: "Это физически несовместимые вещи. При сильном ударе струна колеблется с большой амплитудой и будет задевать лады при низкой высоте. Это не брак гитары — это физика. Задача менеджера — объяснить это до передачи гитары.",
    task: "Скрипт для менеджера: «Мы можем поставить низко, но при вашей манере игры они будут звенеть — это не дефект, это физика. Давайте найдём баланс: сделаем удобно, но с небольшим запасом, чтобы звук был чистым.» Фиксируем договорённость. Мастеру: средняя высота, не ниже стандарта.",
    isConflict: true
  }
};

let answers = {};
let history = [];
let currentQ = 0;

function getResult() {
  const { exp, style, attack, context, buzz } = answers;

  // Конфликт: сильная атака + хочет тихо/комфортно/низко по контексту
  if (attack === "heavy" && (context === "home" || exp === "beginner")) {
    return results.conflict;
  }

  // Отстройка не нужна
  if (exp === "advanced" && attack === "medium" && buzz !== "hate" && context !== "stage") {
    return results.none;
  }

  // Максимально низкая: опытный, перебор, тихо
  if ((exp === "advanced" || exp === "intermediate") && style === "fingerstyle" && attack === "light") {
    return results.maxlow;
  }

  // Средне-высокая: сильная атака в любом опытном контексте
  if (attack === "heavy") {
    return results.high;
  }

  // Высокая: сцена + средняя/любая атака
  if (context === "stage" && attack !== "light") {
    return results.high;
  }

  // Низкая комфортная: начинающий или дома + лёгкая/средняя атака
  if (exp === "beginner" && attack !== "heavy") {
    return results.low;
  }

  // Низкая комфортная: любитель, дома, лёгкая атака
  if (exp === "intermediate" && attack === "light" && context === "home") {
    return results.low;
  }

  // Стандарт — всё остальное
  return results.std;
}

function render() {
  const area = document.getElementById("questionArea");
  const bar = document.getElementById("progressBar");
  const label = document.getElementById("progressLabel");

  bar.style.width = ((currentQ / questions.length) * 100) + "%";
  label.textContent = "Вопрос " + (currentQ + 1) + " из " + questions.length;

  const q = questions[currentQ];
  let html = `<div class="question-num">${q.num}</div>
              <div class="question-text">${q.text}</div>
              <div class="options">`;

  q.options.forEach(opt => {
    html += `<button class="option-btn" onclick="choose('${q.id}', '${opt.val}')">
               <span class="opt-label">→</span>${opt.label}
               <span class="opt-sub">${opt.sub}</span>
             </button>`;
  });

  html += `</div><div class="nav-row">`;
  if (currentQ > 0) {
    html += `<button class="btn-back" onclick="goBack()">← Назад</button>`;
  }
  html += `</div>`;

  area.innerHTML = html;
}

function choose(qId, val) {
  history.push({ q: currentQ, answers: {...answers} });
  answers[qId] = val;

  if (currentQ < questions.length - 1) {
    currentQ++;
    render();
  } else {
    showResult();
  }
}

function goBack() {
  if (history.length > 0) {
    const prev = history.pop();
    currentQ = prev.q;
    answers = prev.answers;
    render();
  }
}

function showResult() {
  const r = getResult();
  const bar = document.getElementById("progressBar");
  const label = document.getElementById("progressLabel");
  bar.style.width = "100%";
  label.textContent = "Готово";

  const area = document.getElementById("quizArea");

  let conflictHtml = r.isConflict ? `<div class="warning-box"><strong>⚠️ Скрипт для менеджера:</strong>«Мы можем поставить низко, но при вашей манере игры они будут звенеть — это не дефект, это физика. Давайте найдём баланс: сделаем удобно и чисто.» Зафиксируйте договорённость.</div>` : "";

  area.innerHTML = `<div class="result-wrap">
    <div class="result-badge ${r.badgeClass}">${r.badge}</div>
    <div class="result-title">${r.title}</div>
    <div class="result-desc">${r.desc}</div>
    ${conflictHtml}
    <div class="result-task"><strong>🔧 Задание мастеру</strong>${r.task}</div>
    <button class="btn-restart" onclick="restart()">↺ Начать заново</button>
  </div>`;
}

function restart() {
  answers = {};
  history = [];
  currentQ = 0;
  document.getElementById("quizArea").innerHTML = '<div class="body" id="questionArea"></div>';
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("progressLabel").textContent = "Вопрос 1 из 5";
  render();
}

render();
</script>
</body>
</html>
